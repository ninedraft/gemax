version: "2"
run:
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
linters:
  enable:
    - bodyclose
    - depguard
    - dogsled
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godox
    - gosec
    - lll
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  disable:
    - dupl
    - gochecknoglobals
    - gochecknoinits
    - mnd
    - wsl
  settings:
    depguard:
      rules:
        Main:
          deny:
            - pkg: golang.org/x/net/context
            - pkg: github.com/pkg/errors
    dogsled:
      max-blank-identifiers: 2
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: false
    funlen:
      lines: 200
      statements: 50
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 10
    godox:
      keywords:
        - TODO
        - FIXME
    govet:
      enable:
        - assign
        - atomic
        - bools
        - buildtag
        - copylocks
        - errorsas
        - loopclosure
        - lostcancel
        - nilfunc
        - printf
        - shift
        - stdmethods
        - structtag
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
      disable:
        - asmdecl
        - cgocall
        - httpresponse
      enable-all: false
      disable-all: false
    lll:
      tab-width: 4
    misspell:
      locale: US
    nakedret:
      max-func-lines: 10
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    unparam:
      check-exported: false
    whitespace:
      multi-if: true
      multi-func: true
    wsl:
      strict-append: true
      allow-assign-and-call: true
      allow-multiline-assign: true
      force-case-trailing-whitespace: 0
      allow-trailing-comment: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - gocognit
          - gocyclo
        path: _test\.go
    paths:
      - ^vend/
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: ""
  new-from-patch: ""
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - vwgroup.dev/slm
  exclusions:
    generated: lax
    paths:
      - ^vend/
      - third_party$
      - builtin$
      - examples$
