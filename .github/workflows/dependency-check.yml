name: dependency-check
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC (09:00 UTC+3)
    - cron: "0 15 * * 5"
permissions:
  contents: read
jobs:
  govulncheck:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Run govulncheck
        uses: ./.github/actions/go-sandbox-cache
        with:
          cache_namespace: dependency-check
          host_prewarm_run: go mod download && go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          sandbox_run: $GITHUB_WORKSPACE/.cache/go-bin/govulncheck ./...
