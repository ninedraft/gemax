on:
  - push
  - pull_request
name: Test
permissions:
  contents: read
jobs:
  test:
    name: Test (${{ matrix.go-version }})
    timeout-minutes: 20
    strategy:
      matrix:
        go-version: [go.mod, stable]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go (stable)
        if: matrix.go-version == 'stable'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false
      - name: Install Go (go.mod)
        if: matrix.go-version == 'go.mod'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Test with cache prewarm
        uses: ./.github/actions/go-sandbox-cache
        with:
          cache_namespace: test
          rootfs_image: ghcr.io/catthehacker/ubuntu:runner-24.04
          host_prewarm_run: go mod download
          sandbox_run: go test -race ./...
