name: latest-deps-test
on:
  workflow_dispatch:
  schedule:
    # Friday at 13:00 UTC (16:00 UTC+3)
    - cron: "0 13 * * 5"
permissions:
  contents: read
jobs:
  latest-deps-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - stable
          - go.mod
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go (stable)
        if: matrix.go == 'stable'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false
      - name: Install Go (go.mod)
        if: matrix.go == 'go.mod'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Upgrade dependencies to latest
        run: go get -u -t ./...
      - name: Run tests
        run: go test -race ./...
